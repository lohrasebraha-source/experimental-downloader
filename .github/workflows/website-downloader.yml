name: Web Downloader

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 Website URL to archive'
        required: true
        type: string
      output_name:
        description: '📝 Output file name (without extension)'
        required: true
        default: 'website_archive'
        type: string

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare web branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin web; then
            git checkout web
            git pull origin web
          else
            git checkout --orphan web
            git rm -rf . || true
            mkdir -p web
            git commit --allow-empty -m "[bot] Initialize web branch"
            git push --set-upstream origin web
          fi

      - name: Setup ArchiveBox Docker
        run: |
          docker pull archivebox/archivebox:latest

      - name: Archive Website
        id: archive
        run: |
          # Create a temporary directory for ArchiveBox data
          mkdir -p archive_data
          chmod 777 archive_data
          
          # Initialize ArchiveBox
          docker run --rm -v $PWD/archive_data:/data archivebox/archivebox init --setup
          
          # Add and archive the URL
          docker run --rm -v $PWD/archive_data:/data archivebox/archivebox add "${{ inputs.website_url }}"
          
          # Move to the branch folder
          mkdir -p web
          cd web
          
          OUTPUT_NAME="${{ inputs.output_name }}"
          
          # Zip the resulting archive data in 45MB chunks
          # We zip the entire archive_data folder to preserve index.html and subfolders
          zip -r -s 45m "${OUTPUT_NAME}.zip" ../archive_data
          
          # Clean up the raw data
          sudo rm -rf ../archive_data
          
          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Archive Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "" >> README.md
          
          # Loop through all files in the web folder
          for file in web/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(echo "$filename" | sed 's/ /%20/g')
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/web/web/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md web
          git commit -m "[bot] Add website archive ${{ env.FILE_NAME }}"
          git push
