name: Website Archiver

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 Website URL to archive'
        required: true
        type: string

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare archives branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin archives; then
            git checkout archives
            git pull origin archives
          else
            git checkout --orphan archives
            git push --set-upstream origin archives
            git rm -rf . || true
            mkdir -p archives
            git commit --allow-empty -m "[bot] Initialize archives branch"
            git push origin archives
          fi

      - name: Setup WARP
        run: |
          sudo apt-get update && sudo apt-get install -y curl zip

          # start WARP (thanks to https://avasam.ir ❤️‍🔥)
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          # Waiting for WARP to initialize (15 seconds)...
          sleep 15

          # Checking WARP status...
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done
          
      - name: Run ArchiveBox
        id: archive
        run: |
          mkdir -p archivebox_data
          chmod 777 archivebox_data
          
          # Initialize ArchiveBox
          docker run --rm -v $PWD/archivebox_data:/data archivebox/archivebox init --setup
          
          # Add the URL to ArchiveBox 
          # Using --network host to route traffic through the locally mapped WARP proxy
          docker run --rm \
            -v $PWD/archivebox_data:/data \
            --network host \
            -e HTTP_PROXY="socks5://127.0.0.1:1080" \
            -e HTTPS_PROXY="socks5://127.0.0.1:1080" \
            archivebox/archivebox add "${{ inputs.website_url }}"
            
          # Prepare safe filename from URL
          SAFE_NAME=$(echo "${{ inputs.website_url }}" | sed -e 's/[^A-Za-z0-9._-]/_/g' | cut -c1-50)
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

          # Zip the archivebox output into 45MB chunks
          mkdir -p archives
          cd archives
          zip -r -s 45m "${SAFE_NAME}.zip" ../archivebox_data/archive/
          
          # Clean up unzipped data to save space
          rm -rf ../archivebox_data
          ls -la
          
          # stop WARP
          docker stop warp || true
          docker rm warp || true

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Archive Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "Archived URL: ${{ inputs.website_url }}" >> README.md
          echo "" >> README.md
          
          # Loop through all files in the archives folder
          for file in archives/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(echo "$filename" | sed 's/ /%20/g')
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/archives/archives/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md archives
          git commit -m "[bot] Add archive for ${{ env.SAFE_NAME }}"
          git push
