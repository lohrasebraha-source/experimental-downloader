name: Web Downloader

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 Website URL to archive'
        required: true
        type: string
      output_name:
        description: '📝 Output file name (without extension)'
        required: true
        default: 'website_archive'
        type: string
      use_warp:
        description: '🛡️ Use WARP (sometimes helps)'
        required: true
        default: false
        type: boolean

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare web branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin web; then
            git checkout web
            git pull origin web
          else
            git checkout --orphan web
            git rm -rf . || true
            mkdir -p web
            git commit --allow-empty -m "[bot] Initialize web branch"
            git push --set-upstream origin web
          fi

      - name: Setup ArchiveBox Docker
        run: |
          docker pull archivebox/archivebox:latest
      
      - name: Setup WARP
        if: ${{ inputs.use_warp }}
        run: |
          # start WARP (thanks to https://avasam.ir ❤️‍🔥)
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          # Waiting for WARP to initialize (15 seconds)...
          sleep 15

          # Checking WARP status...
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Archive Website
        id: archive
        run: |
          # Create a temporary directory for ArchiveBox data
          mkdir -p archive_data
          chmod 777 archive_data

          PROXY_ARGS=""
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            echo "Using WARP proxy..."
            PROXY_ARGS="-e HTTP_PROXY=socks5h://host.docker.internal:1080 -e HTTPS_PROXY=socks5h://host.docker.internal:1080"
          fi
          
          # Initialize ArchiveBox
          docker run --rm $PROXY_ARGS -v $PWD/archive_data:/data archivebox/archivebox init --setup
          
          # Add and archive the URL
          docker run --rm $PROXY_ARGS -v $PWD/archive_data:/data archivebox/archivebox add "${{ inputs.website_url }}"
          
          # Move to the branch folder
          mkdir -p web
          cd web
          
          OUTPUT_NAME="${{ inputs.output_name }}"
          
          # Zip the resulting archive data in 45MB chunks
          # We zip the entire archive_data folder to preserve index.html and subfolders
          zip -r -s 45m "${OUTPUT_NAME}.zip" ../archive_data
          
          # Clean up the raw data
          sudo rm -rf ../archive_data
          
          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Stop WARP
        if: ${{ inputs.use_warp }}
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Archive Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "" >> README.md
          
          # Loop through all files in the web folder
          for file in web/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(echo "$filename" | sed 's/ /%20/g')
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/web/web/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md web
          git commit -m "[bot] Add website archive ${{ env.FILE_NAME }}"
          git push
