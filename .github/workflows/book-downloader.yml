name: Book Downloader

on:
  workflow_dispatch:
    inputs:
      book_query:
        description: '🔍 Book MD5 hash or search query'
        required: true
        type: string
      output_name:
        description: '📝 Output file name (optional, without extension)'
        required: false
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare books branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin books; then
            git checkout books
            git pull origin books
          else
            git checkout --orphan books
            git rm -rf . || true
            mkdir -p books
            git commit --allow-empty -m "[bot] Initialize books branch"
            git push --set-upstream origin books
          fi

      - name: Setup libgen-cli
        run: |
          # Download the latest Linux AMD64 binary from the popular Go libgen-cli repo
          wget https://github.com/ciehanski/libgen-cli/releases/latest/download/libgen-cli-linux-amd64 -O libgen-cli
          chmod +x libgen-cli
          sudo mv libgen-cli /usr/local/bin/

      - name: Download Book
        id: download
        run: |
          mkdir -p tmpbooks
          cd tmpbooks
          
          # Run libgen-cli to download the book
          # Note: adjust the exact command arguments based on the specific libgen-cli package syntax
          libgen-cli download "${{ inputs.book_query }}"

          # Find the downloaded file
          FILE=$(ls -1 | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "No file was downloaded!"
            exit 1
          fi

          # Parse output name
          INPUT_NAME="${{ inputs.output_name }}"
          if [ -n "$INPUT_NAME" ]; then
            EXTENSION="${FILE##*.}"
            mv "$FILE" "${INPUT_NAME}.${EXTENSION}"
            FILE="${INPUT_NAME}.${EXTENSION}"
          fi

          FILE_NO_EXTENSION="${FILE%.*}"
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "FILE_NO_EXTENSION=$FILE_NO_EXTENSION" >> $GITHUB_ENV

          # Move to the branch folder and zip in 45MB chunks
          mkdir -p ../books
          zip -s 45m "../books/${FILE_NO_EXTENSION}.zip" "$FILE"
          
          # Clean up the raw data
          cd ..
          rm -rf tmpbooks

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Book Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "Query: ${{ inputs.book_query }}" >> README.md
          echo "" >> README.md
          
          # Loop through all files in the books folder
          for file in books/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(echo "$filename" | sed 's/ /%20/g')
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/books/books/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md books
          git commit -m "[bot] Add book ${{ env.FILE_NO_EXTENSION }}"
          git push
