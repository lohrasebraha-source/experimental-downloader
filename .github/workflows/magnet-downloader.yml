name: Magnet Downloader (Experimental)

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: '🧲 Magnet link (torrent)'
        required: true
        type: string
      client:
        description: '📦 Torrent client'
        required: true
        default: 'aria2'
        type: choice
        options:
          - aria2
          - transmission
      use_warp:
        description: '🛡️ Use WARP (sometimes helps | +40s)'
        required: true
        default: false
        type: boolean
      parts_size:
        description: '🫙 Parts size (MB)'
        required: false
        type: string
        default: '45'
      output_name:
        description: '📝 Output folder name (optional, will be used as root dir)'
        required: false
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: prepare magnet branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin magnet; then
            git checkout magnet
            git pull origin magnet
          else
            git checkout --orphan magnet
            git rm -rf . || true
            mkdir -p magnet
            git commit --allow-empty -m "[bot] Initialize magnet branch"
            git push --set-upstream origin magnet
          fi

      - name: setup warp
        if: ${{ inputs.use_warp == 'true' || inputs.use_warp == true }}
        run: |
          # clean up any existing container/network (useful for self-hosted runners)
          docker rm -f warp 2>/dev/null || true
          docker network create warp-net 2>/dev/null || true

          # start warp
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "waiting for warp to initialize..."

          # dynamic polling loop (up to ~30 seconds)
          WARP_READY=false
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 3 --socks5-hostname 127.0.0.1:1080 https://1.1.1.1/cdn-cgi/trace 2>/dev/null || true)

            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "warp proxy is ready! (took $i attempts)"
              echo "$RESULT" | grep -E "^(ip|warp|colo)="
              WARP_READY=true
              break
            fi

            echo "attempt $i/10 - warp not ready, waiting 3s..."
            sleep 3
          done

          if [ "$WARP_READY" = false ]; then
            echo "warp failed to activate fully, continuing anyway..."
            echo "last response: $RESULT"
            # exit 1  # uncomment this if you want the pipeline to fail when warp fails
          fi

      - name: install torrent client
        run: |
          sudo apt-get update

          if [ "${{ inputs.client }}" = "aria2" ]; then
            sudo apt-get install -y aria2
          else
            sudo apt-get install -y transmission-cli
          fi

      - name: download from magnet
        id: download
        run: |
          mkdir -p tmpmagnet
          cd tmpmagnet

          PROXY_ARGS=""
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            # use socks5h so hostname resolution goes through warp
            PROXY_ARGS="--all-proxy=socks5h://127.0.0.1:1080"
          fi

          CLIENT="${{ inputs.client }}"

          echo "using client: $CLIENT"

          if [ "$CLIENT" = "aria2" ]; then
            # aria2 settings tuned for smoother magnet downloads in ci
            aria2c \
              --continue=true \
              --max-connection-per-server=4 \
              --min-split-size=10M \
              --summary-interval=30 \
              --content-disposition-default-utf8=true \
              --dir="." \
              $PROXY_ARGS \
              "${{ inputs.magnet_link }}"
          else
            # transmission-cli fallback (no proxy args support in cli directly)
            if [ "${{ inputs.use_warp }}" = "true" ]; then
              echo "warning: transmission-cli does not support direct socks5 proxy, using system env instead"
              export ALL_PROXY="socks5h://127.0.0.1:1080"
            fi

            transmission-cli -w "." "${{ inputs.magnet_link }}"
          fi

          # find downloaded content
          # prefer single top-level dir, otherwise zip everything
          TOP_ITEM=$(ls -1 | head -n 1 || true)

          if [ -z "$TOP_ITEM" ]; then
            echo "nothing downloaded!"
            exit 1
          fi

          OUTPUT_NAME="${{ inputs.output_name }}"
          if [ -z "$OUTPUT_NAME" ]; then
            # derive a safe name from the top item
            SAFE_BASE=$(echo "$TOP_ITEM" | sed 's/^[[:space:]]*//' | tr ' ' '_' )
          else
            SAFE_BASE=$(echo "$OUTPUT_NAME" | sed 's/^[[:space:]]*//' | tr ' ' '_' )
          fi

          echo "SAFE_BASE=$SAFE_BASE" >> $GITHUB_ENV

          mkdir -p ../magnet

          if [ -d "$TOP_ITEM" ]; then
            # top item is a directory, zip it
            zip -0 -r -s "${{ inputs.parts_size }}m" "../magnet/${SAFE_BASE}.zip" "$TOP_ITEM"
          else
            # multiple files or single file, zip everything in current dir
            zip -0 -r -s "${{ inputs.parts_size }}m" "../magnet/${SAFE_BASE}.zip" .
          fi

      - name: stop warp
        if: ${{ inputs.use_warp == 'true' || inputs.use_warp == true }}
        run: |
          docker stop warp || true

      - name: generate readme with download links
        run: |
          rm -f README.md

          echo "# 📥 magnet download links" > README.md
          echo "generated on: $(date)" >> README.md
          echo "" >> README.md

          # loop through all files in the magnet folder
          for file in magnet/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # url encode spaces and special characters for the markdown link
              encoded_filename=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$filename")
              url="https://github.com/${{ github.repository }}/raw/magnet/magnet/$encoded_filename"
              echo "- [download $filename]($url)" >> README.md
            fi
          done

      - name: commit
        run: |
          git add README.md magnet
          git commit -m "[bot] Add magnet download ${{ env.SAFE_BASE }}" || echo "nothing to commit"
          git push
