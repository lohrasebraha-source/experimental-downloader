name: Bash Executor

on:
  workflow_dispatch:
    inputs:
      command:
        description: '🐧 Bash command'
        required: true
        type: string
      output_name:
        description: '📝 Output file name'
        required: true
        default: 'bash_command_result'
        type: string
      use_warp:
        description: '🛡️ Use WARP (sometimes helps | +40s | sets `http_proxy`)'
        required: true
        default: false
        type: boolean
      parts_size:
        description: '🫙 Parts size (MB)'
        required: false
        type: string
        default: '45'

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare bash branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin bash; then
            git checkout bash
            git pull origin bash
          else
            git checkout --orphan bash
            git rm -rf . || true
            mkdir -p bash
            git commit --allow-empty -m "[bot] Initialize bash branch"
            git push --set-upstream origin bash
          fi

      - name: Setup WARP
        if: ${{ inputs.use_warp == 'true' || inputs.use_warp == true }}
        run: |
          # clean up any existing container/network (useful for self-hosted runners)
          docker rm -f warp 2>/dev/null || true
          docker network create warp-net 2>/dev/null || true

          # start WARP 
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize..."

          # dynamic polling loop (up to 30 seconds max)
          WARP_READY=false
          for i in {1..10}; do
            # use 1.1.1.1 for faster trace resolution
            RESULT=$(curl -s --max-time 3 --socks5-hostname 127.0.0.1:1080 https://1.1.1.1/cdn-cgi/trace 2>/dev/null || true)
            
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP proxy is ready! (Took $i attempts)"
              echo "$RESULT" | grep -E "^(ip|warp|colo)=" # Print clean debug info
              WARP_READY=true
              break
            fi
            
            echo "Attempt $i/10 - WARP not ready, waiting 3s..."
            sleep 3
          done

          if [ "$WARP_READY" = false ]; then
            echo "WARP failed to activate fully, continuing anyway..."
            echo "Last response: $RESULT"
            # exit 1  <-- Uncomment this if you want the pipeline to FAIL when WARP fails
          fi

      - name: Execute Bash
        id: execute
        run: |
          mkdir -p tmpbash
          cd tmpbash
          
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            echo "Using WARP proxy..."
            export http_proxy=socks5h://warp:1080
          fi

          ${{ inputs.command }}

          # zip
          mkdir -p ../bash
          zip -0 -s "${{ inputs.parts_size }}m" ../bash/"${{ inputs.output_name }}.zip" .

      - name: Stop WARP
        if: ${{ inputs.use_warp }}
        run: |
          docker stop warp || true

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Bash Command Result Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "" >> README.md
          
          # loop through all files in the bash folder
          for file in bash/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$filename")
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/bash/bash/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md bash
          git commit -m "[bot] Add bash download ${{ env.SAFE_NAME }}"
          git push
